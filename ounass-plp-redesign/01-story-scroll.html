<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FAF8F4">
<title>Story Scroll — Curated For You</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=Nunito+Sans:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --serif: 'Fraunces', Georgia, serif;
    --sans: 'Nunito Sans', -apple-system, system-ui, sans-serif;
    --bg: #0F0F11;
    --surface: #16161A;
    --surface2: #1E1E22;
    --border: #2A2A2F;
    --border-soft: #1F1F24;
    --ink: #F5F3EF;
    --ink2: #D1CEC8;
    --stone: #8F8B84;
    --bronze: #C49373;
    --error: #E25A63;
    --accent: #C49373;
  }
  body.light {
    --bg: #FAF8F4;
    --surface: #FFFFFF;
    --surface2: #F6F3EF;
    --border: #E4E0D9;
    --border-soft: #EDEAE4;
    --ink: #1A1A1A;
    --ink2: #3A3A38;
    --stone: #7B7670;
    --bronze: #9C6B48;
    --error: #C8242B;
    --accent: #9C6B48;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    user-select: none;
    overscroll-behavior: none;
  }
  .screen {
    width: 100vw;
    height: 100vh;
    height: 100svh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  .status-bar {
    height: 47px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px 0 28px;
    font-weight: 600;
    font-size: 15px;
    color: var(--ink);
    flex-shrink: 0;
    padding-top: env(safe-area-inset-top);
    height: calc(47px + env(safe-area-inset-top));
  }
  .status-bar .right { display: flex; gap: 6px; align-items: center; }
  .top-bar {
    padding: 4px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .icon-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink);
    background: transparent;
    border: 0;
    cursor: pointer;
  }
  .top-title { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .top-title .kicker {
    font-size: 9px; font-weight: 700; letter-spacing: 1px;
    color: var(--bronze); text-transform: uppercase;
  }
  .top-title .title {
    font-family: var(--serif); font-weight: 300; font-size: 18px; color: var(--ink);
  }
  .progress-rail {
    padding: 0 16px 12px;
    display: flex; gap: 4px;
    flex-shrink: 0;
  }
  .progress-rail .seg {
    flex: 1; height: 2px; border-radius: 1px; background: var(--border);
    transition: background 0.25s ease;
  }
  .progress-rail .seg.on { background: var(--ink); }

  .story-area {
    flex: 1;
    position: relative;
    overflow: hidden;
    padding: 0 16px;
  }
  .story-viewport {
    position: absolute;
    inset: 0 16px;
    overflow-y: auto;
    scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .story-viewport::-webkit-scrollbar { display: none; }
  .story-card {
    width: 100%;
    height: 100%;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    border-radius: 6px;
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border-soft);
    display: flex;
    flex-direction: column;
    margin-bottom: 12px;
  }
  .story-image {
    flex: 0 0 58%;
    position: relative;
    overflow: hidden;
  }
  .story-image svg { width: 100%; height: 100%; display: block; }
  .reason-chip {
    position: absolute; top: 14px; left: 14px;
    display: flex; align-items: center; gap: 6px;
    background: rgba(15,15,17,0.7);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 7px 12px 7px 10px;
    border-radius: 20px;
    color: #F5F3EF;
  }
  body.light .reason-chip { background: rgba(26,26,26,0.85); }
  .reason-chip .spark { color: var(--bronze); display: flex; }
  .reason-chip .label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .heart-btn {
    width: 36px; height: 36px; border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #1A1A1A;
    border: 0;
    cursor: pointer;
    transition: color 0.2s ease, transform 0.2s ease;
  }
  .heart-btn.on { color: #C8242B; transform: scale(1.1); }
  .heart-pos { position: absolute; top: 14px; right: 14px; }
  .dots {
    position: absolute; bottom: 12px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 6px; align-items: center;
  }
  .dots span { width: 6px; height: 6px; border-radius: 3px; background: rgba(26,26,26,0.25); }
  .dots span.on { background: #1A1A1A; }

  .story-meta {
    flex: 1;
    padding: 18px 18px 16px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .meta-row {
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .brand {
    font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
    color: var(--bronze); text-transform: uppercase;
  }
  .delivery {
    font-size: 10px; font-weight: 700; letter-spacing: 0.6px;
    color: var(--stone); text-transform: uppercase;
  }
  .product-name {
    font-family: var(--serif); font-weight: 300;
    font-size: 22px; letter-spacing: -0.01em;
    color: var(--ink); line-height: 1.15;
  }
  .variants-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 8px;
  }
  .swatches { display: flex; gap: 6px; }
  .swatch {
    width: 20px; height: 20px; border-radius: 10px;
    border: 1px solid var(--border);
    cursor: pointer;
  }
  .swatch.on {
    border: 2px solid var(--ink);
    box-shadow: 0 0 0 2px var(--surface);
  }
  .price { font-size: 16px; font-weight: 700; color: var(--ink); }
  .actions { display: flex; gap: 8px; margin-top: 10px; }
  .btn-primary {
    flex: 1; height: 44px; border-radius: 4px;
    background: var(--ink); color: var(--bg);
    border: 0;
    font-family: var(--sans); font-weight: 700; font-size: 12px;
    letter-spacing: 0.5px; text-transform: uppercase;
    cursor: pointer;
  }
  .btn-icon {
    width: 44px; height: 44px; border-radius: 4px;
    background: transparent; color: var(--ink);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .bottom-rail {
    padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
    background: var(--bg);
    flex-shrink: 0;
  }
  .bottom-rail .bar {
    flex: 1; height: 2px; background: var(--border);
    border-radius: 1px; position: relative;
    overflow: hidden;
  }
  .bottom-rail .bar .fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: var(--ink); border-radius: 1px;
    transition: width 0.3s ease;
  }
  .bottom-rail .hint {
    font-size: 10px; font-weight: 700; letter-spacing: 0.5px; color: var(--stone);
  }
  .home-indicator {
    height: 24px;
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 8px; flex-shrink: 0;
    background: var(--bg);
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    height: calc(24px + env(safe-area-inset-bottom));
  }
  .home-indicator .bar { width: 134px; height: 5px; border-radius: 3px; background: var(--ink); }

  .mode-toggle {
    position: fixed;
    top: env(safe-area-inset-top);
    right: 12px;
    z-index: 100;
    display: flex;
    gap: 0;
    background: rgba(22,22,26,0.7);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 3px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  body.light .mode-toggle { background: rgba(255,255,255,0.7); }
  .mode-toggle button {
    padding: 4px 10px;
    font-size: 9px; font-weight: 700; letter-spacing: 0.6px;
    text-transform: uppercase;
    background: transparent;
    border: 0; border-radius: 12px;
    color: var(--stone);
    cursor: pointer;
  }
  .mode-toggle button.on { background: var(--ink); color: var(--bg); }
</style>
</head>

function formatPrice(p) { return new Intl.NumberFormat('en-US').format(p); }

function renderProductMedia(product) {
  if (product.image) {
    return `<img src="${product.image}" alt="${product.name.replace(/\n/g,' ')}" style="width:100%;height:100%;object-fit:cover;object-position:center top;display:block;"/>`;
  }
  return renderProductSVG(product);
}

    Bags: `<path d="M ${w/2-w*0.18} ${h*0.42} L ${w/2+w*0.18} ${h*0.42} L ${w/2+w*0.14} ${h*0.74} L ${w/2-w*0.14} ${h*0.74} Z" fill="${primary}"/><path d="M ${w/2-w*0.10} ${h*0.42} Q ${w/2-w*0.10} ${h*0.30} ${w/2} ${h*0.30} Q ${w/2+w*0.10} ${h*0.30} ${w/2+w*0.10} ${h*0.42}" fill="none" stroke="${primary}" stroke-width="3"/><circle cx="${w/2}" cy="${h*0.55}" r="3" fill="${third}"/>`,
    RTW: `<path d="M ${w/2-w*0.20} ${h*0.35} L ${w/2-w*0.08} ${h*0.28} L ${w/2} ${h*0.32} L ${w/2+w*0.08} ${h*0.28} L ${w/2+w*0.20} ${h*0.35} L ${w/2+w*0.18} ${h*0.46} L ${w/2+w*0.14} ${h*0.46} L ${w/2+w*0.14} ${h*0.78} L ${w/2-w*0.14} ${h*0.78} L ${w/2-w*0.14} ${h*0.46} L ${w/2-w*0.18} ${h*0.46} Z" fill="${primary}" stroke="${secondary}" stroke-width="0.5"/><circle cx="${w/2}" cy="${h*0.38}" r="2" fill="${third}"/><circle cx="${w/2}" cy="${h*0.50}" r="1.5" fill="${secondary}"/><circle cx="${w/2}" cy="${h*0.60}" r="1.5" fill="${secondary}"/>`,
    Jewellery: `<ellipse cx="${w/2}" cy="${h/2}" rx="${w*0.18}" ry="${w*0.14}" fill="none" stroke="${primary}" stroke-width="6"/><circle cx="${w/2+w*0.18}" cy="${h/2}" r="2.5" fill="${primary}"/>`,
    Shoes: `<path d="M ${w*0.30} ${h*0.58} Q ${w*0.28} ${h*0.52} ${w*0.34} ${h*0.48} L ${w*0.58} ${h*0.44} Q ${w*0.70} ${h*0.46} ${w*0.72} ${h*0.58} L ${w*0.70} ${h*0.64} L ${w*0.32} ${h*0.66} Z" fill="${primary}"/><rect x="${w*0.32}" y="${h*0.62}" width="${w*0.40}" height="4" fill="${third}"/><path d="M ${w*0.60} ${h*0.44} L ${w*0.62} ${h*0.40} L ${w*0.66} ${h*0.42}" stroke="${primary}" stroke-width="2" fill="none"/>`,
  };
  return `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice"><rect width="${w}" height="${h}" fill="${bg}"/>${shapes[category] || shapes.Bags}</svg>`;
}

const ICON_SPARK = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2 7 7 2-7 2-2 7-2-7-7-2 7-2z"/></svg>';
const ICON_HEART = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 11.5l-8.3 7.8a1 1 0 0 1-1.4 0L3 11.5c-2-2.2-2-5.4.1-7.3 2-1.8 5.3-1.6 7.2.6l1.6 1.9 1.6-1.9c1.9-2.2 5.1-2.4 7.2-.6 2.1 1.9 2.2 5.1.1 7.3z"/></svg>';
const ICON_HEART_FILL = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.8 11.5l-8.3 7.8a1 1 0 0 1-1.4 0L3 11.5c-2-2.2-2-5.4.1-7.3 2-1.8 5.3-1.6 7.2.6l1.6 1.9 1.6-1.9c1.9-2.2 5.1-2.4 7.2-.6 2.1 1.9 2.2 5.1.1 7.3z"/></svg>';
const ICON_PLUS = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';

function renderCard(product, idx) {
  const card = document.createElement('div');
  card.className = 'story-card';
  card.dataset.idx = idx;
  const nameLines = product.name.split('\n').map(l => `<span>${l}</span>`).join('<br>');
  card.innerHTML = `
    <div class="story-image" style="background:${product.bg}">
      ${renderProductMedia(product)}
      <div class="reason-chip">
        <span class="spark">${ICON_SPARK}</span>
        <span class="label">${product.reason}</span>
      </div>
      <div class="heart-pos">
        <button class="heart-btn" aria-label="Save" data-save>
          ${ICON_HEART}
        </button>
      </div>
      <div class="dots">
        <span class="on"></span><span></span><span></span>
      </div>
    </div>
    <div class="story-meta">
      <div class="meta-row">
        <span class="brand">${product.brand}</span>
        <span class="delivery">${product.delivery}</span>
      </div>
      <div class="product-name">${nameLines}</div>
      <div class="variants-row">
        <div class="swatches">
          ${product.colors.map((c,i) => `<span class="swatch${i===0?' on':''}" style="background:${c}" data-sw="${i}"></span>`).join('')}
        </div>
        <div class="price">${formatPrice(product.price)} ${product.currency}</div>
      </div>
      <div class="actions">
        <button class="btn-primary">Add to Bag</button>
        <button class="btn-icon" aria-label="More">${ICON_PLUS}</button>
      </div>
    </div>`;

  card.querySelector('[data-save]').addEventListener('click', (e) => {
    const btn = e.currentTarget;
    btn.classList.toggle('on');
    btn.innerHTML = btn.classList.contains('on') ? ICON_HEART_FILL : ICON_HEART;
  });
  card.querySelectorAll('[data-sw]').forEach(sw => {
    sw.addEventListener('click', () => {
      card.querySelectorAll('[data-sw]').forEach(s => s.classList.remove('on'));
      sw.classList.add('on');
    });
  });
  return card;
}

const viewport = document.getElementById('viewport');
const rail = document.getElementById('progress-rail');
const fillbar = document.getElementById('fillbar');
const editNum = document.getElementById('edit-num');

PRODUCTS.forEach((p, i) => viewport.appendChild(renderCard(p, i)));
PRODUCTS.forEach((_, i) => {
  const seg = document.createElement('div');
  seg.className = 'seg' + (i === 0 ? ' on' : '');
  rail.appendChild(seg);
});

let currentIdx = 0;
function updateProgress() {
  const cardH = viewport.clientHeight;
  const idx = Math.round(viewport.scrollTop / cardH);
  if (idx === currentIdx) return;
  currentIdx = idx;
  const segs = rail.querySelectorAll('.seg');
  segs.forEach((s, i) => s.classList.toggle('on', i <= idx));
  fillbar.style.width = ((idx + 1) / PRODUCTS.length * 100) + '%';
  editNum.textContent = `The Edit · ${String(idx + 1).padStart(2,'0')} of ${String(PRODUCTS.length).padStart(2,'0')}`;
}
viewport.addEventListener('scroll', updateProgress, { passive: true });

// Mode toggle
document.querySelectorAll('#modeToggle button').forEach(btn => {
  btn.addEventListener('click', () => {
    const mode = btn.dataset.mode;
    document.body.classList.toggle('light', mode === 'light');
    document.querySelectorAll('#modeToggle button').forEach(b => b.classList.toggle('on', b === btn));
    document.querySelector('meta[name=theme-color]').setAttribute('content', mode === 'light' ? '#FAF8F4' : '#0F0F11');
  });
});
</script>
